<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi Level ATC – Start</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.1rem;
      margin-top: 0;
      color: #4b5563;
      font-weight: normal;
      margin-bottom: 30px;
    }

    p {
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .button-row {
      margin-top: 30px;
      display: flex;
      justify-content: flex-end;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 22px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .hint {
      font-size: 0.9rem;
      color: #6b7280;
      margin-top: 8px;
    }

    .error {
      color: #b91c1c;
      font-size: 0.95rem;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Auswirkungsanalyse von Multi Level ATC</h1>
    <h2>Startseite der Untersuchung</h2>

    <p>
      In dieser Untersuchung werden Entscheidungssituationen aus dem ATC-Kontext gezeigt.
      Bitte beantworten Sie zunächst die folgenden Angaben und starten Sie danach den Versuch.
    </p>

    <form id="startForm">
      <div class="form-group">
        <label for="age">Alter</label>
        <input
          type="number"
          id="age"
          name="age"
          min="16"
          max="100"
          required
          placeholder="Bitte Alter eingeben"
        />
      </div>

      <div class="form-group">
        <label for="experience">Erfahrung im Bereich ATC / ATM</label>
        <select id="experience" name="experience" required>
          <option value="">Bitte auswählen</option>
          <option value="0">Keine Erfahrung</option>
          <option value="1">Sehr geringe Erfahrung</option>
          <option value="2">Geringe Erfahrung</option>
          <option value="3">Mittlere Erfahrung</option>
          <option value="4">Hohe Erfahrung</option>
          <option value="5">Sehr hohe Erfahrung</option>
        </select>
      </div>

      <div id="errorMessage" class="error">
        Bitte fülle beide Felder aus.
      </div>

      <div class="button-row">
        <button type="button" id="startButton">Weiter</button>
      </div>
    </form>
  </div>


<script src="api.js"></script>

<script>
  const startButton = document.getElementById("startButton");
  const errorMessage = document.getElementById("errorMessage");

  startButton.addEventListener("click", async function () {
    const age = document.getElementById("age").value.trim();
    const experience = document.getElementById("experience").value;

    if (!age || !experience) {
      errorMessage.textContent = "Bitte fülle beide Felder aus.";
      errorMessage.style.display = "block";
      return;
    }

    errorMessage.style.display = "none";

    const sessionId = crypto.randomUUID();

    try {
      await insertRow("sessions", {
        session_id: sessionId,
        age: Number(age),
        atc_experience: experience
      });

      sessionStorage.setItem("session_id", sessionId);
      sessionStorage.setItem("participant_age", age);
      sessionStorage.setItem("participant_atc_experience", experience);

      window.location.href = "instructions.html";
    } catch (error) {
      console.error("Start-Session-Fehler:", error);
      errorMessage.textContent = "Fehler beim Starten der Session: " + error.message;
      errorMessage.style.display = "block";
    }
  });
</script>
</body>
</html>
