<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi Level ATC – Abschluss</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
    }

    .container {
      width: 100%;
      max-width: 850px;
      background: white;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 2rem;
    }

    p {
      line-height: 1.6;
      margin-bottom: 16px;
      font-size: 1.05rem;
    }

    .info-box {
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: #065f46;
      padding: 16px 18px;
      border-radius: 10px;
      margin: 24px 0;
    }

    .small-note {
      color: #6b7280;
      font-size: 0.95rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vielen Dank</h1>

    <p>
      Sie haben die Bearbeitung abgeschlossen. Ihre Eingaben wurden erfasst.
    </p>
    
    <p>
      Sie können dieses Fenster nun schließen.
    </p>

    <p class="small-note">
      Multi Level ATC – Untersuchung zur Entscheidungsunterstützung
    </p>
  </div>
</body>
</html>
