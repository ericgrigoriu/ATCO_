<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi Level ATC – Feedback</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .container {
      max-width: 950px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .subtitle {
      color: #4b5563;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .feedback-card {
      margin-bottom: 24px;
      padding: 20px;
      background: #f8fafc;
      border: 1px solid #dbe4ee;
      border-radius: 12px;
    }

    .feedback-card h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.15rem;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
      background: white;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .footer-row {
      margin-top: 30px;
      display: flex;
      justify-content: flex-end;
    }

    .submit-btn {
      border: none;
      border-radius: 8px;
      padding: 12px 22px;
      font-size: 1rem;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    .submit-btn:hover {
      background: #1d4ed8;
    }

    .message {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      display: none;
      line-height: 1.5;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    .info-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      padding: 14px 16px;
      border-radius: 10px;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    

    .feedback-card-header {
      margin-bottom: 16px;
    }

    .feedback-card-title h2 {
      margin-top: 0;
      margin-bottom: 12px;
    }

    .feedback-preview {
      display: block;
      width: 100%;
      max-width: 850px;
      max-height: 420px;
      margin: 12px auto 24px auto;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: white;
      object-fit: contain;
    }

    .feedback-preview-box {
      width: 100%;
      max-width: 850px;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      color: #92400e;
      padding: 14px 16px;
      border-radius: 10px;
      line-height: 1.5;
      font-size: 1rem;
      font-weight: 600;
      margin: 12px 0 24px 0;
    }

    @media (max-width: 700px) {
      .feedback-card-header {
        flex-direction: column;
      }

      .feedback-preview,
      .feedback-preview-box {
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Abschließendes Feedback</h1>
    <p class="subtitle">
      Bitte bewerten Sie die einzelnen Verfahren bzw. Unterstützungsformen jeweils auf einer Skala bis 7.
      Je höher die Zahl, desto höher ist die Zustimmung.
    </p>
    <div class="info-box">
      7 = "Stimme voll zu", 1 = "Stimme überhaupt nicht zu."
    </div>

    <div id="feedbackContainer"></div>

    <div id="errorMessage" class="message error"></div>

    <div class="footer-row">
      <button type="button" class="submit-btn" onclick="submitFeedback()">
        Feedback absenden
      </button>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    const feedbackItems = [
      {
        key: "without_support",
        label: "Ohne Unterstützung"
      },
      {
        key: "support_1",
        label: "Fehlermeldung per Text",
        previewType: "text",
        previewText: "Flight LOT403 could not be assigned a FL near 260, blocked by EWG10M FL260."
      },
      {
        key: "support_2",
        label: "Markierung der Luftfahrzeuge",
        previewType: "image",
        previewImage: "stimuli/Farbe1.png"
      },
      {
        key: "support_3",
        label: "Akustisches Signal"
      },
      {
        key: "support_4",
        label: "Systemvorschlag",
        previewType: "image",
        previewImage: "stimuli/Vorschlag2.png"
      }
    ];

    const feedbackQuestions = [
      { key: "sinnvoll", label: "Die Art der Unterstützung war sinnvoll." },
      { key: "verstaendlich", label: "Die Unterstützung war eindeutig verständlich." },
      { key: "vertrauen_sicherheit", label: "Ich habe der Unterstützung vertraut und mich im Umgang sicher gefühlt." },
      { key: "konflikterkennung", label: "Die Unterstützung half mir, potenzielle Konflikte zu erkennen." },
      { key: "informationen_auffindbar", label: "Relevante Informationen waren schnell auffindbar." },
      { key: "zukuenftiger_verkehr", label: "Die zukünftige Verkehrssituation wurde gut verdeutlicht." },
      { key: "konsequenzen", label: "Die Konsequenzen der vorgeschlagenen Handlung wurden gut verdeutlicht." },
      { key: "ablenkung", label: "Die Unterstützung hat mich vom eigentlichen Lagebild abgelenkt." },
    ];

    const feedbackQuestionsWithoutSupport = [
      { key: "sinnvoll", label: "Die Entscheidungsfindung ohne Unterstützung war möglich." },
      { key: "verstaendlich", label: "Die vorliegende Situation war eindeutig verständlich." },
      { key: "vertrauen_sicherheit", label: "Ich habe mich bei der Bearbeitung ohne Unterstützung sicher gefühlt." },
      { key: "konflikterkennung", label: "Potenzielle Konflikte konnten gut erkannt werden." },
      { key: "informationen_auffindbar", label: "Relevante Informationen waren schnell auffindbar." },
      { key: "zukuenftiger_verkehr", label: "Die zukünftige Verkehrssituation war gut einschätzbar." },
      { key: "konsequenzen", label: "Die Konsequenzen möglicher Handlungen waren ohne Unterstützung gut einschätzbar." },
      { key: "ablenkung", label: "Die Darstellung hat mich vom eigentlichen Lagebild abgelenkt." }
];

    const feedbackContainer = document.getElementById("feedbackContainer");

    function createRatingOptions() {
      let options = '<option value="">Bitte auswählen</option>';
      for (let i = 1; i <= 7; i++) {
        options += `<option value="${i}">${i}</option>`;
      }
      return options;
    }

    function renderFeedbackForm() {
      feedbackContainer.innerHTML = feedbackItems.map(item => {
        const questions =
          item.key === "without_support"
            ? feedbackQuestionsWithoutSupport
            : feedbackQuestions;

        let previewHtml = "";

        if (item.previewType === "image" && item.previewImage) {
          previewHtml = `
            <img
              class="feedback-preview"
              src="${item.previewImage}"
              alt="Beispielbild ${item.label}"
            >
          `;
        }

        if (item.previewType === "text" && item.previewText) {
          previewHtml = `
            <div class="feedback-preview-box">
              ${item.previewText}
            </div>
          `;
        }

        return `
      <div class="feedback-card">
        <div class="feedback-card-header">
          <div class="feedback-card-title">
            <h2>${item.label}</h2>
          </div>
        </div>
    
        ${previewHtml}
    
        ${questions.map(question => `
              <div class="form-group">
                <label for="${question.key}_${item.key}">
                  ${question.label}
                </label>
                <select id="${question.key}_${item.key}">
                  ${createRatingOptions()}
                </select>
              </div>
            `).join("")}
          </div>
        `;
      }).join("");
    }
    
    async function submitFeedback() {
      const errorMessage = document.getElementById("errorMessage");
      errorMessage.style.display = "none";

      const sessionId = sessionStorage.getItem("session_id");

      const collectedItems = feedbackItems.map(item => {
        const ratings = {};

        const questions =
          item.key === "without_support"
            ? feedbackQuestionsWithoutSupport
            : feedbackQuestions;

        questions.forEach(question => {
          ratings[question.key] = document.getElementById(`${question.key}_${item.key}`).value;
        });

        return {
          key: item.key,
          label: item.label,
          ratings: ratings
        };
      });

      const missingRating = collectedItems.some(item => {
        const questions =
          item.key === "without_support"
          ? feedbackQuestionsWithoutSupport
          : feedbackQuestions;

        return questions.some(question => item.ratings[question.key] === "");
      });

      if (missingRating) {
        errorMessage.textContent = "Bitte beantworten Sie alle Bewertungsfelder.";
        errorMessage.style.display = "block";
        return;
      }

      const feedbackData = {
        session_id: sessionId,
        feedback_items: collectedItems
      };

      try {
        await saveFeedback(feedbackData);
        window.location.href = "finish.html";
      } catch (error) {
        console.error("Fehler beim Speichern des Feedbacks:", error);
        errorMessage.textContent = "Fehler beim Speichern des Feedbacks: " + error.message;
        errorMessage.style.display = "block";
      }
    }

    renderFeedbackForm();
  </script>
</body>
</html>
