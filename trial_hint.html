<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi Level ATC – Zweiter Hauptteil</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      padding: 32px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .subtitle {
      color: #4b5563;
      margin-bottom: 24px;
    }

    .top-bar {
      margin-bottom: 20px;
    }

    .status-box {
      display: inline-block;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      padding: 12px 16px;
      border-radius: 10px;
    }

    .stimulus-box {
      background: #f8fafc;
      border: 1px solid #dbe4ee;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: center;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }

    .stimulus-box.dragging {
      cursor: grabbing;
    }

   .stimulus-box img {
      width: 100%;
      max-width: 1400px;
      height: auto;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      background: white;
      transform-origin: center center;
      transition: transform 0.03s linear;
      user-select: none;
      pointer-events: auto;
    }

    .question-box h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .choice-btn {
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 1rem;
      cursor: pointer;
      background: #e5e7eb;
      color: #111827;
    }

    .choice-btn:hover {
      background: #d1d5db;
    }

    .choice-btn.active {
      background: #2563eb;
      color: white;
    }

    .details-box {
      display: none;
      margin-top: 24px;
      padding: 20px;
      background: #f8fafc;
      border: 1px solid #dbe4ee;
      border-radius: 12px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
      background: white;
    }

    .footer-row {
      margin-top: 30px;
      display: flex;
      justify-content: flex-end;
    }

    .submit-btn {
      border: none;
      border-radius: 8px;
      padding: 12px 22px;
      font-size: 1rem;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    .submit-btn:hover {
      background: #1d4ed8;
    }

    .message {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      display: none;
      line-height: 1.5;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

  .support-box {
    display: none;
    background: #fef3c7;
    border: 1px solid #fcd34d;
    color: #92400e;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 20px;
    line-height: 1.5;
    font-weight: 600;
  }
    
  </style>
</head>
<body>
  <div class="container">
    <h1>Hauptteil</h1>
    <p class="subtitle">Bitte beurteilen Sie jede Situation möglichst zügig und sorgfältig.</p>

    <div class="top-bar">
      <div class="status-box" id="trialCounter">Situation 1 von 12</div>
    </div>

    <div id="supportBox" class="support-box"></div>

    <div class="stimulus-box">
      <img id="stimulusImage" src="" alt="ATC-Situation" />
    </div>

    <div class="question-box">
      <h2>Liegt in der dargestellten Situation ein Konflikt vor?</h2>
      <div class="button-row">
        <button type="button" class="choice-btn" id="btnConflict">Konflikt</button>
        <button type="button" class="choice-btn" id="btnNoConflict">Kein Konflikt</button>
      </div>
      <div class="button-row" id="proposalButtonRow" style="display: none; margin-top: 12px;">
        <button type="button" class="choice-btn" id="btnAcceptProposal">
          Vorschlag annehmen
        </button>
    </div>
    </div>

    <div class="details-box" id="detailsBox">
      <div class="form-group">
        <label for="callsign">Für welches Lfz (Callsign) würden Sie eine Anweisung geben?</label>
        <input
          type="text"
          id="callsign"
          placeholder="Bitte Callsign eingeben"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="instruction">Welche Anweisung würden Sie geben / hätten Sie im Vorfeld gegeben?</label>
        <select id="instruction">
          <option value="">Bitte auswählen</option>
          <option value="steigen und halten">Steigen und Halten</option>
          <option value="sinken und halten">Sinken und Halten</option>
          <option value="höhe halten">Höhe halten</option>
          <option value="links drehen">Links drehen</option>
          <option value="rechts drehen">Rechts drehen</option>
          <option value="geschwindigkeit erhöhen">Geschwindigkeit erhöhen</option>
          <option value="geschwindigkeit verringern">Geschwindigkeit verringern</option>
        </select>
      </div>
    </div>

    <div id="errorMessage" class="message error"></div>

    <div class="footer-row">
      <button type="button" class="submit-btn" onclick="submitTrial()">Weiter</button>
    </div>
  </div>

  <audio id="supportAudio" preload="auto"></audio>

  <script src="api.js"></script>

  <script>
  const params = new URLSearchParams(window.location.search);
  const block = params.get("block") || "1";

  const scenariosByBlock = {
    "1": [
      { id: 1, image: "stimuli/Text1.png", supportText: "Flight LOT403 could not be assigned a FL near 260, blocked by EWG10M FL260." },
      { id: 2, image: "stimuli/Text2.png", supportText: "Separation Issue Found: Flight KLM38Z (descend) and EWG4UT (climb) are not suffiecently separated." },
      { id: 3, image: "stimuli/Text3.png", supportText: "Flight RYR1PP could not be assigned a FL near 250, blocked by WZZ29SG FL250 and KLM1771 FL260." },
      { id: 4, image: "stimuli/Text4.png", supportText: "Separation Issue Found: Flight DBJUK and UAL963 and EZY47AH are not suffiecently separated." },
      { id: 5, image: "stimuli/Text5.png", supportText: "Separation Issue Found: Flight DLH493 (descend) and SWR359D are not suffiecently separated." },
      { id: 6, image: "stimuli/Text6.png", supportText: "Flight SAS2767 could not be assigned a FL near 380, blocked by BAW846W FL380." }
    ],
    "2": [
      { id: 7, image: "stimuli/Farbe1.png", supportText: "" },
      { id: 8, image: "stimuli/Farbe2.png", supportText: "" },
      { id: 9, image: "stimuli/Farbe3.png", supportText: "" },
      { id: 10, image: "stimuli/Farbe4.png", supportText: "" },
      { id: 11, image: "stimuli/Farbe5.png", supportText: "" },
      { id: 12, image: "stimuli/Farbe6.png", supportText: "" },
      { id: 13, image: "stimuli/Farbe7.png", supportText: "" },
    ],
    "3": [
      { id: 14, image: "stimuli/Audio1.png", supportText: "", audio: "audio/1.mp3" },
      { id: 15, image: "stimuli/Audio2.png", supportText: "", audio: "audio/2.mp3" },
      { id: 16, image: "stimuli/Audio3.png", supportText: "", audio: "audio/3.mp3" },
      { id: 17, image: "stimuli/Audio4.png", supportText: "", audio: "audio/4.mp3" },
      { id: 18, image: "stimuli/Audio5.png", supportText: "", audio: "audio/5.mp3" },
      { id: 19, image: "stimuli/Audio6.png", supportText: "", audio: "audio/6.mp3" },
    ],
    "4": [
      {id: 20, image: "stimuli/Vorschlag1.png", supportText: ""},
      {id: 21, image: "stimuli/Vorschlag2.png", supportText: ""},
      {id: 22, image: "stimuli/Vorschlag3.png", supportText: ""},
      {id: 23, image: "stimuli/Vorschlag4.png", supportText: ""},
      {id: 24, image: "stimuli/Vorschlag5.png", supportText: ""},
      {id: 25, image: "stimuli/Vorschlag6.png", supportText: ""},
      {id: 26, image: "stimuli/Vorschlag7.png", supportText: ""},
      {id: 27, image: "stimuli/Vorschlag8.png", supportText: ""},
    ]
  };

  const scenarios = scenariosByBlock[block] || scenariosByBlock["1"];

  let currentIndex = 0;
  let selectedAnswer = null;
  let startTime = 0;
  let decisionTimeMs = null;
  let inputStartTime = null;
  let imageScale = 1;
  let translateX = 0;
  let translateY = 0;
  let isDragging = false;
  let dragStartX = 0;
  let dragStartY = 0;
    
  let results = JSON.parse(sessionStorage.getItem("hint_results")) || [];
  let pendingSaves = [];

  const stimulusImage = document.getElementById("stimulusImage");
  const trialCounter = document.getElementById("trialCounter");
  const btnConflict = document.getElementById("btnConflict");
  const btnNoConflict = document.getElementById("btnNoConflict");
  const detailsBox = document.getElementById("detailsBox");
  const callsign = document.getElementById("callsign");
  const instruction = document.getElementById("instruction");
  const errorMessage = document.getElementById("errorMessage");
  const supportBox = document.getElementById("supportBox");
  const supportAudio = document.getElementById("supportAudio");
  const proposalButtonRow = document.getElementById("proposalButtonRow");
  const btnAcceptProposal = document.getElementById("btnAcceptProposal");

  const stimulusBox = document.querySelector(".stimulus-box");

  function updateImageTransform() {
    stimulusImage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${imageScale})`;
  }

  stimulusImage.addEventListener("wheel", (event) => {
    event.preventDefault();

    const zoomStep = 0.1;

    if (event.deltaY < 0) {
      imageScale += zoomStep;
    } else {
      imageScale -= zoomStep;
    }

    imageScale = Math.min(Math.max(imageScale, 1), 4);

    if (imageScale === 1) {
      translateX = 0;
      translateY = 0;
    }

    updateImageTransform();
  });

  stimulusImage.addEventListener("mousedown", (event) => {
    if (imageScale <= 1) return;

    isDragging = true;
    dragStartX = event.clientX - translateX;
    dragStartY = event.clientY - translateY;

    stimulusBox.classList.add("dragging");
  });

  document.addEventListener("mousemove", (event) => {
    if (!isDragging) return;

    translateX = event.clientX - dragStartX;
    translateY = event.clientY - dragStartY;

    updateImageTransform();
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
    stimulusBox.classList.remove("dragging");
  });

  function preloadNextImage() {
    const nextScenario = scenarios[currentIndex + 1];
    if (!nextScenario) return;

    const img = new Image();
    img.src = nextScenario.image;
  }

  function loadTrial() {
    const scenario = scenarios[currentIndex];

    selectedAnswer = null;
    decisionTimeMs = null;
    inputStartTime = null;
    errorMessage.style.display = "none";
    
    btnConflict.classList.remove("active");
    btnNoConflict.classList.remove("active");

    btnAcceptProposal.classList.remove("active");

    if (block === "4") {
      proposalButtonRow.style.display = "flex";
    } else {
      proposalButtonRow.style.display = "none";
    }

    detailsBox.style.display = "none";
    callsign.value = "";
    instruction.value = "";

    trialCounter.textContent = `Situation ${currentIndex + 1} von ${scenarios.length}`;

    if (scenario.supportText && scenario.supportText.trim() !== "") {
      supportBox.textContent = scenario.supportText;
      supportBox.style.display = "block";
    } else {
      supportBox.textContent = "";
      supportBox.style.display = "none";
    }

    if (scenario.audio && scenario.audio.trim() !== "") {
      supportAudio.pause();
      supportAudio.currentTime = 0;
      supportAudio.src = scenario.audio;

      setTimeout(() => {
        supportAudio.play().catch((error) => {
          console.warn("Audio konnte nicht automatisch abgespielt werden:", error);
        });
      }, 1000);
    } else {
      supportAudio.pause();
      supportAudio.currentTime = 0;
      supportAudio.removeAttribute("src");
    }

    stimulusImage.onload = () => {
      startTime = performance.now();
    };

    imageScale = 1;
    translateX = 0;
    translateY = 0;
    updateImageTransform();
    
    stimulusImage.src = scenario.image;
    preloadNextImage();
  }

   btnConflict.addEventListener("click", () => {
    selectedAnswer = "conflict";
  
    if (decisionTimeMs === null) {
      decisionTimeMs = Math.round(performance.now() - startTime);
    }
  
    if (inputStartTime === null) {
      inputStartTime = performance.now();
    }
     
    btnConflict.classList.add("active");
    btnNoConflict.classList.remove("active");
  
    if (typeof btnAcceptProposal !== "undefined" && btnAcceptProposal) {
      btnAcceptProposal.classList.remove("active");
    }
  
    detailsBox.style.display = "block";
    errorMessage.style.display = "none";
  });
    
  btnNoConflict.addEventListener("click", () => {
    selectedAnswer = "no_conflict";
  
    if (decisionTimeMs === null) {
      decisionTimeMs = Math.round(performance.now() - startTime);
    }
  
    btnNoConflict.classList.add("active");
    btnConflict.classList.remove("active");
  
    if (typeof btnAcceptProposal !== "undefined" && btnAcceptProposal) {
      btnAcceptProposal.classList.remove("active");
    }
  
    detailsBox.style.display = "none";
    callsign.value = "";
    instruction.value = "";
    errorMessage.style.display = "none";
  });
  
   btnAcceptProposal.addEventListener("click", () => {
    selectedAnswer = "proposal_accepted";
  
    if (decisionTimeMs === null) {
      decisionTimeMs = Math.round(performance.now() - startTime);
    }
  
    inputStartTime = null;
  
    btnAcceptProposal.classList.add("active");
    btnConflict.classList.remove("active");
    btnNoConflict.classList.remove("active");
  
    detailsBox.style.display = "none";
    callsign.value = "";
    instruction.value = "";
    errorMessage.style.display = "none";
  });
    
  async function submitTrial() {
    const scenario = scenarios[currentIndex];

    errorMessage.style.display = "none";

    if (!selectedAnswer) {
      errorMessage.textContent = "Bitte wählen Sie zunächst aus, ob ein Konflikt vorliegt oder nicht.";
      errorMessage.style.display = "block";
      return;
    }

    if (selectedAnswer === "conflict") {
      if (!callsign.value.trim() || !instruction.value) {
        errorMessage.textContent = "Bitte geben Sie bei einem Konflikt sowohl ein Callsign als auch eine Anweisung an.";
        errorMessage.style.display = "block";
        return;
      }
    }

    const endTime = performance.now();

    if (decisionTimeMs === null) {
      decisionTimeMs = Math.round(endTime - startTime);
    }
    
    const inputTimeMs =
      selectedAnswer === "conflict" && inputStartTime !== null
        ? Math.round(endTime - inputStartTime)
        : "";
    
    const sessionId = sessionStorage.getItem("session_id");

    const totalTimeMs = Math.round(endTime - startTime);

    const trialResult = {
      session_id: sessionId,
      scenario_id: scenario.id,
      image: scenario.image.split("/").pop().replace(".png", ""),
      answer: selectedAnswer,
      callsign: selectedAnswer === "conflict" ? callsign.value.trim() : "",
      instruction: selectedAnswer === "conflict" ? instruction.value : "",
      decision_time_ms: decisionTimeMs,
      input_time_ms: inputTimeMs,
      total_time_ms: totalTimeMs
    };

    results.push(trialResult);
    sessionStorage.setItem("hint_results", JSON.stringify(results));

    const savePromise = saveHintResult(trialResult).catch((error) => {
      console.error("Fehler beim Speichern der Hinweis-Antwort:", error);
    });

    pendingSaves.push(savePromise);

    currentIndex++;

    if (currentIndex < scenarios.length) {
      loadTrial();
    } else {
      await Promise.allSettled(pendingSaves);
      const nextBlock = Number(block) + 1;

      if (nextBlock <= 4) {
        window.location.href = `support_intro.html?block=${nextBlock}`;
      } else {
        window.location.href = "feedback.html";
      }
    }
  }

  console.log("block =", block);
  console.log("scenarios =", scenarios);
  console.log("scenarios.length =", scenarios.length);

  loadTrial();
</script>
</body>
</html>
